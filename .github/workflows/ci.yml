name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: loopline_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u root -ptestroot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mysql://root:testroot@127.0.0.1:3306/loopline_test
      AUTH_SECRET: ci-secret-loopline-must-be-at-least-32-chars
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_FROM: "Loopline <noreply@loopline.app>"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test
